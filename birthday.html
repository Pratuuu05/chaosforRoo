<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;

    /* 💙 SAME BLUE BACKGROUND */
    background: linear-gradient(135deg, #dbeafe, #93c5fd);

    display: flex;
    justify-content: center;
    align-items: center;
}

/* card */
.container {
    background: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    width: 300px;

    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
}

/* title */
h1 {
    color: #1e3a8a;
    font-size: 22px;
}

/* text */
p {
    font-size: 13px;
    color: #374151;
}

/* video */
video {
    width: 100%;
    border-radius: 15px;
    margin: 12px 0;
}

/* button */
button {
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    background: #60a5fa;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 10px #60a5fa;
}

/* hearts */
.heart {
    position: absolute;
    color: #60a5fa;
    font-size: 18px;
    animation: float 5s linear infinite;
}

@keyframes float {
    from {
        transform: translateY(100vh);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Happy Birthday Roo 🎂❤️</h1>

    <p>
        You survived all my irritation 😏  
        So here is your reward 😌❤️
    </p>

    <video controls>
        <source src="video/funny.mp4" type="video/mp4">
    </video>

    <p>
        You are my favorite chaos and best person 😭❤️
    </p>

    <button onclick="moreLove()">Ready for surprise? 🎁</button>

</div>

<script>

function moreLove() {
    window.location.href = "gift.html";
}

setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "❤️";

    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);

}, 300);

</script>

</body>
</html>
