<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Code 😏</title>
<link rel="stylesheet" href="style.css">

<style>
.passcode {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 20px 0;
}

.box {
    width: 38px;
    height: 48px;
    border-radius: 12px;
    border: 2px solid #bfdbfe;
    text-align: center;
    font-size: 18px;
    background: #f0f9ff;
}

.box:focus {
    border-color: #2563eb;
    box-shadow: 0 0 10px #60a5fa;
    outline: none;
}

.shake {
    animation: shake 0.3s;
}

@keyframes shake {
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Hmm… one last check 😒❤️</h1>

    <div class="passcode">
        <input class="box" id="b1" maxlength="1">
        <input class="box" id="b2" maxlength="1">
        <input class="box" id="b3" maxlength="1">
        <input class="box" id="b4" maxlength="1">   
    </div>

    <button onclick="checkCode()">Unlock 🔓</button>
    <p id="msg"></p>
</div>

<script>

function checkCode() {

    const b1 = document.getElementById("b1").value.trim();
    const b2 = document.getElementById("b2").value.trim();
    const b3 = document.getElementById("b3").value.trim();
    const b4 = document.getElementById("b4").value.trim();

    const code = b1 + b2 + b3 + b4;

    const msg = document.getElementById("msg");

    // 🔍 debug (optional)
    console.log("Entered code:", code);

    if (code === "0405") {

        msg.innerText = "Wait… checking 😏";

        setTimeout(() => {
            msg.innerText = "Still verifying...";
        }, 1000);

        setTimeout(() => {
            window.location.href = "surprise.html";
        }, 2000);

    } else {
        msg.innerText = "Wrong 😭 try again";
    }
}

/* ✨ auto move cursor */
const inputs = document.querySelectorAll(".box");

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });
});

</script>

</body>
</html>
