<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MI Gift 💙</title>

<!-- 🔥 FONT -->
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;

    /* ✅ FIXED BACKGROUND */
    background-image: url("./images/bg-collage.png"); /* 👈 check this path */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* 🔥 LIGHT OVERLAY (not too dark) */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35); /* 👈 lighter so image visible */
}

/* 🎥 VIDEO */
.video-box {
    position: absolute;
    top: 40px;
    left: 40px;

    width: 520px;
    border-radius: 20px;
    overflow: hidden;

    box-shadow: 0 0 25px #3b82f6;
}

video {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

/* 🔥 TEXT */
.text {
    position: absolute;
    top: 360px; /* 👈 adjusted */
    left: 50px;
}

/* 🔥 BIG NUMBER */
.number {
    font-family: 'Anton', sans-serif;
    font-size: 110px;
    color: #fbbf24;
    margin: 0;
}

/* 🔥 HITMAN */
.tag {
    font-family: 'Anton', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
}

/* 💙 LINE */
.line {
    font-size: 16px;
    color: #93c5fd;
    margin-top: 10px;
}

/* 🎁 BUTTON */
.next-btn {
    position: absolute;
    bottom: 40px;
    right: 60px;

    padding: 12px 25px;
    border-radius: 25px;
    border: none;

    background: #3b82f6;
    color: white;
    font-size: 16px;

    cursor: pointer;
    box-shadow: 0 0 15px #3b82f6;

    transition: 0.3s;
}

.next-btn:hover {
    transform: scale(1.1);
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- 🎥 VIDEO -->
<div class="video-box">
    <video autoplay muted controls onclick="this.muted=false">
        <source src="video/mi.mp4" type="video/mp4">
    </video>
</div>

<!-- 🔥 TEXT -->
<div class="text">
    <div class="number">45</div>
    <div class="tag">HITMAN</div>

    <div class="line">
        Rohit + MI = Emotion 💙<br>
        For the biggest fan of MI and cricket 🏏
    </div>
</div>

<!-- 🎁 NEXT -->
<button class="next-btn" onclick="goNext()">
    Next Gift 🎁
</button>

<script>
function goNext() {
    window.location.href = "gift.html";
}
</script>

</body>
</html>
